id: network-ls-create
title: "Docker 网络管理基础"
difficulty: 2
category: containers
subcategory: docker-network
tags: [docker, network]
description: |
  Docker 提供了网络功能来管理容器间的通信。
  docker network ls 列出网络，docker network create 创建网络。
  
  请完成以下任务：
  1. 列出所有 Docker 网络，保存到 /tmp/network-list.txt
  2. 创建一个名为 my-network 的桥接网络
  3. 创建一个名为 isolated-net 的桥接网络，指定子网 172.28.0.0/16
  4. 再次列出网络，保存到 /tmp/network-list-after.txt
requires_docker: true
hints:
  - level: 1
    text: "docker network ls 列出所有网络"
  - level: 2
    text: "docker network create 网络名 创建网络"
  - level: 3
    text: "docker network create --subnet=172.28.0.0/16 isolated-net"
verify:
  - type: script
    path: check.sh
