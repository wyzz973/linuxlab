id: docker-cp
title: "Docker 文件复制"
difficulty: 2
category: containers
subcategory: docker-basics
tags: [docker, cp]
description: |
  docker cp 可以在主机和容器之间复制文件，格式为：
  - 主机到容器：docker cp 本地路径 容器名:容器路径
  - 容器到主机：docker cp 容器名:容器路径 本地路径
  
  请完成以下任务：
  1. 运行一个后台 nginx 容器，名为 cp-demo
  2. 创建本地文件 /tmp/upload.txt，内容为 "file from host"
  3. 将 /tmp/upload.txt 复制到容器的 /tmp/upload.txt
  4. 将容器中的 /etc/nginx/nginx.conf 复制到主机的 /tmp/nginx.conf
requires_docker: true
hints:
  - level: 1
    text: "docker cp 源路径 目标路径，容器路径格式为 容器名:路径"
  - level: 2
    text: "docker cp /tmp/upload.txt cp-demo:/tmp/upload.txt"
  - level: 3
    text: "docker cp cp-demo:/etc/nginx/nginx.conf /tmp/nginx.conf"
verify:
  - type: script
    path: check.sh
