id: docker-rm-prune
title: "Docker 容器删除与清理"
difficulty: 2
category: containers
subcategory: docker-basics
tags: [docker, rm, prune]
description: |
  docker rm 删除已停止的容器，docker container prune 批量清理所有已停止的容器。
  
  请完成以下任务：
  1. 创建三个已停止的容器（prune-test-1, prune-test-2, prune-test-3）
  2. 使用 docker rm 删除 prune-test-1
  3. 使用 docker container prune 清理剩余的已停止容器
  4. 确认三个测试容器都已被删除
requires_docker: true
hints:
  - level: 1
    text: "docker rm 容器名 删除已停止的容器"
  - level: 2
    text: "docker container prune -f 批量删除所有已停止的容器"
  - level: 3
    text: "先用 docker run 创建容器，然后分别用 rm 和 prune 删除"
verify:
  - type: script
    path: check.sh
