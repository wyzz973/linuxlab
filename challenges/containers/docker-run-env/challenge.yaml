id: docker-run-env
title: "Docker 环境变量设置"
difficulty: 2
category: containers
subcategory: docker-basics
tags: [docker, run, env]
description: |
  使用 -e 参数可以设置容器中的环境变量。很多应用通过环境变量来配置参数。
  
  请完成以下任务：
  1. 运行一个 MySQL 容器（后台模式），设置以下环境变量：
     - MYSQL_ROOT_PASSWORD=my-secret-pw
     - MYSQL_DATABASE=testdb
  2. 容器名称设置为 my-mysql
requires_docker: true
hints:
  - level: 1
    text: "使用 -e KEY=VALUE 设置环境变量"
  - level: 2
    text: "可以使用多个 -e 参数"
  - level: 3
    text: "docker run -d --name my-mysql -e MYSQL_ROOT_PASSWORD=my-secret-pw -e MYSQL_DATABASE=testdb mysql"
verify:
  - type: script
    path: check.sh
