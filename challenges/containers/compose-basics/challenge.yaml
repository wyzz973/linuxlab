id: compose-basics
title: "Docker Compose 基础"
difficulty: 2
category: containers
subcategory: docker-compose
tags: [docker, compose]
description: |
  Docker Compose 是一个用于定义和运行多容器应用的工具。
  通过 docker-compose.yaml 文件来配置服务。
  
  请完成以下任务：
  1. 查看提供的 docker-compose.yaml 文件
  2. 该文件定义了一个 nginx web 服务，端口映射 8090:80
  3. 使用 docker compose up -d 启动服务
requires_docker: true
compose_file: docker-compose.yaml
hints:
  - level: 1
    text: "使用 docker compose up -d 在后台启动服务"
  - level: 2
    text: "确保在 docker-compose.yaml 所在目录执行命令"
verify:
  - type: script
    path: check.sh
