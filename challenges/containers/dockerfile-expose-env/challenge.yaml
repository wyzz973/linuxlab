id: dockerfile-expose-env
title: "Dockerfile EXPOSE 和 ENV 指令"
difficulty: 2
category: containers
subcategory: dockerfile
tags: [docker, dockerfile, expose, env]
description: |
  EXPOSE 声明容器监听的端口，ENV 设置环境变量。
  
  请完成以下任务：
  1. 在 /tmp/envapp/ 目录下创建 Dockerfile
  2. 基于 alpine 镜像
  3. 设置环境变量 APP_NAME=MyApp 和 APP_VERSION=1.0
  4. 使用 EXPOSE 声明端口 8080
  5. CMD 为 ["sh", "-c", "echo $APP_NAME $APP_VERSION && sleep 3600"]
  6. 构建镜像，标签为 envapp:v1
  7. 运行容器，名为 env-test
requires_docker: true
hints:
  - level: 1
    text: "使用 ENV KEY=VALUE 设置环境变量"
  - level: 2
    text: "EXPOSE 8080 声明端口"
  - level: 3
    text: "ENV APP_NAME=MyApp 和 ENV APP_VERSION=1.0"
verify:
  - type: script
    path: check.sh
