id: op-boolean
title: "布尔运算符与逻辑组合"
difficulty: 3
category: shell-scripting
subcategory: operators
tags: [boolean, logical, operators]
description: |
  学习 Shell 布尔运算符 ! -a -o 和逻辑运算符 && ||。
  
  请编写脚本 /home/learner/solution.sh，完成以下任务：
  给定 age=25 score=85：
  1. 使用 -a（AND）判断 age > 18 且 score > 60，输出 "Adult with passing score"
  2. 使用 -o（OR）判断 age < 18 或 score > 90，输出结果
  3. 使用 !（NOT）判断 age 不等于 30
  4. 使用 [[ ]] 和 && 判断 age >= 18 且 age <= 65
  5. 使用 [[ ]] 和 || 判断 score >= 90 或 age < 20
  
  期望输出：
  Adult with passing score
  Not (under 18 or above 90)
  age is not 30
  Working age
  Not (excellent or young)
hints:
  - level: 1
    text: "-a 表示逻辑与，-o 表示逻辑或，! 表示逻辑非"
  - level: 2
    text: "在 [ ] 中使用 -a -o，在 [[ ]] 中使用 && ||"
  - level: 3
    text: "[ $age -gt 18 -a $score -gt 60 ] 组合条件"
verify:
  - type: command_output
    command: "bash /home/learner/solution.sh"
    expect: "Adult with passing score\nNot (under 18 or above 90)\nage is not 30\nWorking age\nNot (excellent or young)"
