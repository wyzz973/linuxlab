id: flow-select
title: "select 菜单选择"
difficulty: 3
category: shell-scripting
subcategory: flow-control
tags: [select, menu, interactive]
description: |
  学习 select 语句创建菜单的用法。
  
  请编写脚本 /home/learner/solution.sh，创建一个模拟的菜单处理脚本。
  由于 select 通常用于交互式场景，这里我们使用 echo 模拟输入。
  
  脚本需要接受一个数字参数（1-4），根据选项输出：
  1) 查看日期 -> 输出 "You selected: View date"
  2) 查看用户 -> 输出 "You selected: View user"
  3) 查看目录 -> 输出 "You selected: View directory"
  4) 退出 -> 输出 "Goodbye!"
  其他 -> 输出 "Invalid option"
  
  用 case 语句实现菜单逻辑。脚本使用 $1 接收选项。
  
  测试：bash solution.sh 2
  期望输出：You selected: View user
hints:
  - level: 1
    text: "select 创建带编号的菜单，但这里用 case 模拟菜单逻辑"
  - level: 2
    text: "case $1 in 1) echo 'View date';; 2) ..."
  - level: 3
    text: "使用 $1 获取第一个命令行参数"
verify:
  - type: command_output
    command: "bash /home/learner/solution.sh 2"
    expect: "You selected: View user"
