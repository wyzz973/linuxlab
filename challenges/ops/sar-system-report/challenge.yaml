id: sar-system-report
title: "sar 系统活动报告"
difficulty: 4
category: ops
subcategory: system-monitoring
tags: [sar, sysstat, monitoring, performance]
description: |
  sar（System Activity Reporter）收集和报告系统活动信息。

  请完成以下任务：
  1. 使用 sar 收集 CPU 使用率（采集 3 次，间隔 1 秒），保存到 /tmp/sar_cpu.txt
  2. 使用 sar 收集内存使用情况，保存到 /tmp/sar_mem.txt
  3. 使用 sar 收集网络统计，保存到 /tmp/sar_net.txt
hints:
  - level: 1
    text: "sar 1 3 收集 CPU 信息"
  - level: 2
    text: "sar -r 1 3 收集内存信息"
  - level: 3
    text: "sar -n DEV 1 3 收集网络统计"
verify:
  - type: script
    path: check.sh
