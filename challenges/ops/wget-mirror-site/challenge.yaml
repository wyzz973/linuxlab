id: wget-mirror-site
title: "wget 递归下载和镜像"
difficulty: 3
category: ops
subcategory: network-troubleshoot
tags: [wget, download, mirror]
description: |
  wget 支持递归下载和网站镜像功能。

  环境中运行着一个 HTTP 服务（端口 8080），提供几个页面。请完成以下任务：
  1. 使用 wget 下载首页到 /tmp/index.html
  2. 使用 wget 将下载日志保存到 /tmp/wget.log
  3. 查看 wget 支持的所有选项中关于递归下载的部分，保存到 /tmp/wget_recursive_help.txt
hints:
  - level: 1
    text: "wget -O 指定输出文件名"
  - level: 2
    text: "wget -o 指定日志文件"
  - level: 3
    text: "wget --help | grep -A5 recursive"
verify:
  - type: script
    path: check.sh
