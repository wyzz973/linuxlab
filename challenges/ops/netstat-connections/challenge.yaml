id: netstat-connections
title: "netstat 查看网络连接状态"
difficulty: 2
category: ops
subcategory: network-troubleshoot
tags: [netstat, network, connections]
description: |
  netstat 虽然较老，但仍然广泛使用。

  请完成以下任务：
  1. 使用 netstat（或 ss）查看所有网络连接，保存到 /tmp/connections.txt
  2. 统计各种连接状态（ESTABLISHED、LISTEN 等）的数量，保存到 /tmp/conn_stats.txt
hints:
  - level: 1
    text: "netstat -an 或 ss -an 查看所有连接"
  - level: 2
    text: "ss -tan | awk 统计状态"
  - level: 3
    text: "ss -tan | awk "\"{print
verify:
  - type: script
    path: check.sh
