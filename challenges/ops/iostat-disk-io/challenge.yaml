id: iostat-disk-io
title: "iostat 磁盘 IO 分析"
difficulty: 3
category: ops
subcategory: system-monitoring
tags: [iostat, disk, io, monitoring]
description: |
  iostat 报告 CPU 统计信息和设备 I/O 统计信息。

  请完成以下任务：
  1. 使用 iostat 查看磁盘 IO 统计（采集 3 次，间隔 1 秒），保存到 /tmp/iostat_output.txt
  2. 查看 /proc/diskstats 了解磁盘活动，保存到 /tmp/diskstats.txt
  3. 使用 df -h 查看磁盘空间使用情况，保存到 /tmp/disk_usage.txt
hints:
  - level: 1
    text: "iostat -x 1 3 获取扩展统计"
  - level: 2
    text: "cat /proc/diskstats 查看磁盘统计"
  - level: 3
    text: "df -h 查看磁盘使用量"
