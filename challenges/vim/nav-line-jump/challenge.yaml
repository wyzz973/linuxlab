id: nav-line-jump
title: "行号跳转 - G/gg/:n"
difficulty: 1
category: vim
subcategory: navigation
tags: [G, gg, ":n"]
description: |
  Vim 中跳转到指定行号：
  - gg：跳到文件第一行
  - G：跳到文件最后一行
  - nG 或 :n：跳到第 n 行

  请打开 challenge.txt，这是一个有 10 行的配置文件。
  将第 7 行的 "debug = false" 改为 "debug = true"。
  完成后保存退出（:wq）。
setup_files:
  - path: challenge.txt
    content: |
      [server]
      host = 0.0.0.0
      port = 8080
      workers = 4
      
      [logging]
      debug = false
      level = info
      file = /var/log/app.log
      rotate = daily
verify:
  - type: script
    path: check.sh
hints:
  - level: 1
    text: "使用 :7 或 7G 跳到第 7 行"
  - level: 2
    text: "跳到第 7 行后，用 /false 搜索，然后 cw 改为 true"
  - level: 3
    text: ":7<Enter> 跳到第7行，f= 跳到等号，ww 跳到 false，cw 输入 true，Esc 后 :wq"
