id: umask-default
title: "设置默认权限 - umask"
difficulty: 3
category: linux-basics
subcategory: permissions
tags: [umask]
description: |
  umask 决定了新建文件和目录的默认权限。
  文件默认 666 减去 umask，目录默认 777 减去 umask。
  
  请完成以下任务：
  1. 将 umask 设置为 027
  2. 创建文件 /home/lab/secure_file.txt
  3. 创建目录 /home/lab/secure_dir
  
  这样新文件权限应为 640，新目录权限应为 750。
hints:
  - level: 1
    text: "umask 值是从默认权限中'减去'的"
  - level: 2
    text: "先执行 umask 027，再创建文件和目录"
  - level: 3
    text: "umask 027 && touch /home/lab/secure_file.txt && mkdir /home/lab/secure_dir"
verify:
  - type: command_output
    command: "stat -c %a /home/lab/secure_file.txt"
    expect: "640"
