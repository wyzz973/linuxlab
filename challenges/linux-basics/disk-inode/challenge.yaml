id: disk-inode
title: "查看 inode 使用情况 - df -i"
difficulty: 2
category: linux-basics
subcategory: disk-management
tags: [df]
description: |
  除了磁盘空间，inode 数量也是一个重要的系统资源。
  当 inode 用完时，即使有磁盘空间也无法创建新文件。
  
  请使用 df 命令查看所有文件系统的 inode 使用情况，
  保存到 /tmp/result.txt
hints:
  - level: 1
    text: "df -i 显示 inode 使用情况"
  - level: 2
    text: "df -i 或 df -ih（人类可读）"
  - level: 3
    text: "df -ih > /tmp/result.txt"
verify:
  - type: script
    path: check.sh
