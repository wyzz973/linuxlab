id: pipe-combo
title: "综合管道 - 日志分析实战"
difficulty: 4
category: linux-basics
subcategory: pipes-redirects
tags: [grep, awk, sort, uniq, head]
description: |
  综合运用管道和多个命令进行日志分析。
  
  /home/lab/web_access.log 是 Web 服务器访问日志，每行格式：
  IP - - [日期] "方法 URL 协议" 状态码 大小
  
  请分析日志，找出访问次数最多的前 5 个 IP 地址，
  输出格式为 "次数 IP"（按次数从多到少），保存到 /tmp/result.txt
hints:
  - level: 1
    text: "可以用 awk 提取 IP（第一列），再用 sort | uniq -c | sort -rn"
  - level: 2
    text: "awk '{print $1}' | sort | uniq -c | sort -rn | head -5"
  - level: 3
    text: "awk '{print $1}' /home/lab/web_access.log | sort | uniq -c | sort -rn | head -5 > /tmp/result.txt"
verify:
  - type: script
    path: check.sh
